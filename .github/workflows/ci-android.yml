name: ci-android

on:
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        targets: |
          armv7-linux-androideabi
          aarch64-linux-android
          i686-linux-android
          x86_64-linux-android

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install cargo-ndk
      run: |
        cargo install cargo-ndk --locked

    - name: Build (Android armeabi-v7a)
      if: '!cancelled()'
      run: |
        cargo ndk -t armeabi-v7a -o Native/target/android-build build --manifest-path Native/Cargo.toml -p uniasset --release

    - name: Build (Android arm64-v8a)
      if: '!cancelled()'
      run: |
        cargo ndk -t arm64-v8a -o Native/target/android-build build --manifest-path Native/Cargo.toml -p uniasset --release

    - name: Build (Android x86)
      if: '!cancelled()'
      run: |
        cargo ndk -t x86 -o Native/target/android-build build --manifest-path Native/Cargo.toml -p uniasset --release

    - name: Build (Android x86_64)
      if: '!cancelled()'
      run: |
        cargo ndk -t x86_64 -o Native/target/android-build build --manifest-path Native/Cargo.toml -p uniasset --release

    - name: Upload Artifact (arm-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-arm-neon-android
        path: ${{github.workspace}}/Native/target/android-build/armeabi-v7a/release/libuniasset.so

    - name: Upload Artifact (aarch64-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-aarch64-android
        path: ${{github.workspace}}/Native/target/android-build/arm64-v8a/release/libuniasset.so

    - name: Upload Artifact (x86-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-x86-android
        path: ${{github.workspace}}/Native/target/android-build/x86/release/libuniasset.so

    - name: Upload Artifact (x64-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-x64-android
        path: ${{github.workspace}}/Native/target/android-build/x86_64/release/libuniasset.so
