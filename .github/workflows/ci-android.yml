name: ci-android

on:
  workflow_dispatch: {}
  workflow_call: {}


jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release
      PROJECT_ROOT: ${{github.workspace}}/Native
    steps:
    - uses: actions/checkout@v3

    - name: Setup environment
      run: |
        sudo apt install -y git build-essential ninja-build

    - uses: nttld/setup-ndk@v1
      name: Setup NDK
      id: setup-ndk
      with:
        ndk-version: r27d

    - name: Setup vcpkg
      id: setup-vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg ${{github.workspace}}/vcpkg-ci
        pushd ${{github.workspace}}/vcpkg-ci
        ./bootstrap-vcpkg.sh
        echo "vcpkg-root=$(pwd)" >> $GITHUB_OUTPUT
        popd

    - name: Build (Android armeabi-v7a)
      if: '!cancelled()'
      env:
        VCPKG_INSTALLATION_ROOT: ${{ steps.setup-vcpkg.outputs.vcpkg-root }}
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk }}
        TRIPLET: arm-neon-android
        ABI: armeabi-v7a
      run: bash ${{ env.PROJECT_ROOT }}/scripts/build-android.sh

    - name: Build (Android arm64-v8a)
      if: '!cancelled()'
      env:
        VCPKG_INSTALLATION_ROOT: ${{ steps.setup-vcpkg.outputs.vcpkg-root }}
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk }}
        TRIPLET: arm64-android
        ABI: arm64-v8a
      run: bash ${{ env.PROJECT_ROOT }}/scripts/build-android.sh
        

    - name: Build (Android x86)
      if: '!cancelled()'
      env:
        VCPKG_INSTALLATION_ROOT: ${{ steps.setup-vcpkg.outputs.vcpkg-root }}
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk }}
        TRIPLET: x86-android
        ABI: x86
      run: bash ${{ env.PROJECT_ROOT }}/scripts/build-android.sh

    - name: Build (Android x86_64)
      if: '!cancelled()'
      env:
        VCPKG_INSTALLATION_ROOT: ${{ steps.setup-vcpkg.outputs.vcpkg-root }}
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk }}
        TRIPLET: x64-android
        ABI: x86_64
      run: bash ${{ env.PROJECT_ROOT }}/scripts/build-android.sh

    - name: Upload Artifact (arm-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-arm-neon-android
        path: ${{ env.PROJECT_ROOT }}/build-arm-neon-android/src/uniasset/libuniasset.so

    - name: Upload Artifact (arm64-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-arm64-android
        path: ${{ env.PROJECT_ROOT }}/Native/build-arm64-android/src/uniasset/libuniasset.so

    - name: Upload Artifact (x86-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-x86-android
        path: ${{ env.PROJECT_ROOT }}/Native/build-x86-android/src/uniasset/libuniasset.so

    - name: Upload Artifact (x64-android)
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: libuniasset-x64-android
        path: ${{ env.PROJECT_ROOT }}/Native/build-x64-android/src/uniasset/libuniasset.so
