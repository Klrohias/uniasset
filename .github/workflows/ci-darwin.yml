name: ci-darwin

on:
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  build-darwin:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: x86_64-apple-darwin,aarch64-apple-darwin,aarch64-apple-ios

    - name: Build macOS (x86_64-apple-darwin)
      if: '!cancelled()'
      run: |
        cargo build --manifest-path Native/Cargo.toml -p uniasset --release --target x86_64-apple-darwin

    - name: Build macOS (aarch64-apple-darwin)
      if: '!cancelled()'
      run: |
        cargo build --manifest-path Native/Cargo.toml -p uniasset --release --target aarch64-apple-darwin

    - name: Build iOS (aarch64-apple-ios)
      if: '!cancelled()'
      run: |
        # iOS does not support dylib outputs; build staticlib only.
        # Also set deployment target for C deps compiled via `cc` crate.
        export IPHONEOS_DEPLOYMENT_TARGET=10.0
        cargo rustc --manifest-path Native/Cargo.toml -p uniasset --release --target aarch64-apple-ios --lib -- --crate-type staticlib


    - name: Upload Artifact (x64-osx)
      uses: actions/upload-artifact@v4
      if: '!cancelled()'
      with:
        name: libuniasset-x64-macos
        path: ${{github.workspace}}/Native/target/x86_64-apple-darwin/release/libuniasset.dylib

    - name: Upload Artifact (aarch64-macos)
      uses: actions/upload-artifact@v4
      if: '!cancelled()'
      with:
        name: libuniasset-aarch64-macos
        path: ${{github.workspace}}/Native/target/aarch64-apple-darwin/release/libuniasset.dylib

    - name: Upload Artifact (aarch64-ios)
      uses: actions/upload-artifact@v4
      if: '!cancelled()'
      with:
        name: libuniasset-aarch64-ios
        path: ${{github.workspace}}/Native/target/aarch64-apple-ios/release/libuniasset.a
